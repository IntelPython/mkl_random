name: Conda package using conda-forge

on:
  pull_request:
  push:
    branches: [master]

permissions: read-all

env:
  PACKAGE_NAME: mkl_random
  MODULE_NAME: mkl_random
  TEST_ENV_NAME: test_mkl_random
  VER_SCRIPT1: "import json; f = open('ver.json', 'r'); j = json.load(f); f.close(); "
  VER_SCRIPT2: "d = j['mkl_random'][0]; print('='.join((d[s] for s in ('version', 'build'))))"

jobs:
  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python: "3.10"
            numpy: "2.2"
          - python: "3.11"
            numpy: "2.3"
          - python: "3.12"
            numpy: "2.3"
          - python: "3.13"
            numpy: "2.3"
          - python: "3.14"
            numpy: "2.3"

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@3155a141048f8f89c06b4cdae32e7853e97536bc # v0.13.0
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set pkgs_dirs
        run: |
          echo "pkgs_dirs: [~/.conda/pkgs]" >> ~/.condarc

      - name: Cache conda packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        env:
          CACHE_NUMBER: 0  # Increase to reset cache
        with:
          path: ~/.conda/pkgs
          key:
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-${{hashFiles('**/meta.yaml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-

      - name: Add conda to system path
        run: echo "$CONDA/bin" >> "$GITHUB_PATH"

      - name: Install conda-build
        run: conda install conda-build

      - name: Build conda package
        run: |
          CHANNELS=(-c conda-forge --override-channels)
          VERSIONS=(--python "${{ matrix.python }}" --numpy "${{ matrix.numpy }}")
          TEST=(--no-test)

          conda build \
            "${TEST[@]}" \
            "${VERSIONS[@]}" \
            "${CHANNELS[@]}" \
            conda-recipe-cf

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PACKAGE_NAME }} ${{ runner.os }} Python ${{ matrix.python }}
          path: /usr/share/miniconda/conda-bld/linux-64/${{ env.PACKAGE_NAME }}-*.conda

  build_windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd /C CALL {0}
    strategy:
      matrix:
        include:
          - python: "3.10"
            numpy: "2.2"
          - python: "3.11"
            numpy: "2.3"
          - python: "3.12"
            numpy: "2.3"
          - python: "3.13"
            numpy: "2.3"
          - python: "3.14"
            numpy: "2.3"

    env:
      conda-bld: C:\Miniconda\conda-bld\win-64\

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@3155a141048f8f89c06b4cdae32e7853e97536bc # v0.13.0
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
        with:
          miniforge-version: latest
          activate-environment: build
          channels: conda-forge
          python-version: ${{ matrix.python }}

      - name: Cache conda packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        env:
          CACHE_NUMBER: 3  # Increase to reset cache
        with:
          path: /home/runner/conda_pkgs_dir
          key:
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-${{hashFiles('**/meta.yaml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-

      - name: Store conda paths as envs
        shell: bash -l {0}
        run: |
          echo "CONDA_BLD=$CONDA/conda-bld/win-64/" | tr "\\\\" '/' >> "$GITHUB_ENV"

      - name: Install conda build
        run: |
          conda install -n base -y conda-build
          conda list -n base

      - name: Build conda package
        run: conda build --no-test --python ${{ matrix.python }} --numpy ${{ matrix.numpy }} -c conda-forge --override-channels conda-recipe-cf

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PACKAGE_NAME }} ${{ runner.os }} Python ${{ matrix.python }}
          path: ${{ env.CONDA_BLD }}${{ env.PACKAGE_NAME }}-*.conda

  test_linux:
    needs: build_linux
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - python: "3.10"
            numpy: "2.2"
          - python: "3.11"
            numpy: "2.3"
          - python: "3.12"
            numpy: "2.3"
          - python: "3.13"
            numpy: "2.3"
          - python: "3.14"
            numpy: "2.3"

    env:
      CHANNELS: -c conda-forge --override-channels

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }} ${{ runner.os }} Python ${{ matrix.python }}

      - name: Add conda to system path
        run: echo "$CONDA/bin" >> "$GITHUB_PATH"

      - name: Install conda-build
        run: conda install conda-build

      - name: Create conda channel
        run: |
          mkdir -p "$GITHUB_WORKSPACE/channel/linux-64"
          conda index "$GITHUB_WORKSPACE/channel" || exit 1
          mv "${PACKAGE_NAME}"-*.conda "$GITHUB_WORKSPACE/channel/linux-64" || exit 1
          conda index "$GITHUB_WORKSPACE/channel" || exit 1
          # Test channel
          conda search "$PACKAGE_NAME" -c "$GITHUB_WORKSPACE/channel" --override-channels --info --json > "$GITHUB_WORKSPACE/ver.json"
          cat ver.json

      - name: Collect dependencies
        run: |
          . "$CONDA/etc/profile.d/conda.sh"
          PACKAGE_VERSION="$(python -c "${VER_SCRIPT1} ${VER_SCRIPT2}")"
          export PACKAGE_VERSION
          conda create -n "${{ env.TEST_ENV_NAME }}" "${PACKAGE_NAME}=${PACKAGE_VERSION}" "python=${{ matrix.python }}" "numpy=${{ matrix.numpy }}" -c "$GITHUB_WORKSPACE/channel" -c conda-forge --override-channels --only-deps --dry-run > lockfile
          cat lockfile

      - name: Set pkgs_dirs
        run: |
          echo "pkgs_dirs: [~/.conda/pkgs]" >> ~/.condarc

      - name: Cache conda packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        env:
          CACHE_NUMBER: 0  # Increase to reset cache
        with:
          path: ~/.conda/pkgs
          key:
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-${{hashFiles('lockfile') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-

      - name: Install mkl_random
        run: |
          . "$CONDA/etc/profile.d/conda.sh"
          PACKAGE_VERSION="$(python -c "${VER_SCRIPT1} ${VER_SCRIPT2}")"
          export PACKAGE_VERSION
          conda create -n "${{ env.TEST_ENV_NAME }}" "${PACKAGE_NAME}=${PACKAGE_VERSION}" pytest "python=${{ matrix.python }}" "numpy=${{ matrix.numpy }}" -c "$GITHUB_WORKSPACE/channel" -c conda-forge --override-channels
          # Test installed packages
          conda list

      - name: Run tests
        run: |
          . "$CONDA/etc/profile.d/conda.sh"
          conda activate "${{ env.TEST_ENV_NAME }}"
          pytest -vv --pyargs ${{ env.MODULE_NAME }}

  test_windows:
    needs: build_windows
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd /C CALL {0}
    strategy:
      matrix:
        include:
          - python: "3.10"
            numpy: "2.2"
          - python: "3.11"
            numpy: "2.3"
          - python: "3.12"
            numpy: "2.3"
          - python: "3.13"
            numpy: "2.3"
          - python: "3.14"
            numpy: "2.3"

    env:
      CHANNELS: -c conda-forge --override-channels

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }} ${{ runner.os }} Python ${{ matrix.python }}

      - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
        with:
          miniforge-version: latest
          channels: conda-forge
          activate-environment: ${{ env.TEST_ENV_NAME }}
          python-version: ${{ matrix.python }}

      - name: Install conda-index
        run: |
          conda install conda-index

      - name: Create conda channel
        run: |
          mkdir ${{ env.GITHUB_WORKSPACE }}\channel\win-64
          move ${{ env.PACKAGE_NAME }}-*.conda ${{ env.GITHUB_WORKSPACE }}\channel\win-64
          python -m conda_index ${{ env.GITHUB_WORKSPACE }}/channel

          # Test channel
          conda search ${{ env.PACKAGE_NAME }} -c ${{ env.GITHUB_WORKSPACE }}/channel --override-channels --info --json > ${{ env.GITHUB_WORKSPACE }}\ver.json
          more ${{ env.GITHUB_WORKSPACE }}\ver.json

      - name: Collect dependencies
        shell: cmd
        run: |
          @ECHO ON
          copy /Y ${{ env.GITHUB_WORKSPACE }}\ver.json .
          set "SCRIPT=%VER_SCRIPT1% %VER_SCRIPT2%"
          FOR /F "tokens=* USEBACKQ" %%F IN (`python -c "%SCRIPT%"`) DO (
             SET PACKAGE_VERSION=%%F
          )
          conda install -n ${{ env.TEST_ENV_NAME }} ${{ env.PACKAGE_NAME }}=%PACKAGE_VERSION% python=${{ matrix.python }} numpy=${{ matrix.numpy }} -c ${{ env.GITHUB_WORKSPACE }}/channel ${{ env.CHANNELS }} --only-deps --dry-run > lockfile

      - name: Cache conda packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        env:
          CACHE_NUMBER: 3  # Increase to reset cache
        with:
          path: /home/runner/conda_pkgs_dir
          key:
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-${{hashFiles('lockfile') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-python-${{ matrix.python }}-
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-

      - name: Install mkl_random
        shell: cmd
        run: |
          @ECHO ON
          copy /Y ${{ env.GITHUB_WORKSPACE }}\ver.json .
          set "SCRIPT=%VER_SCRIPT1% %VER_SCRIPT2%"
          FOR /F "tokens=* USEBACKQ" %%F IN (`python -c "%SCRIPT%"`) DO (
             SET PACKAGE_VERSION=%%F
          )
          conda create -n ${{ env.TEST_ENV_NAME }} ${{ env.PACKAGE_NAME }}=%PACKAGE_VERSION% pytest python=${{ matrix.python }} numpy=${{ matrix.numpy }} -c ${{ env.GITHUB_WORKSPACE }}/channel ${{ env.CHANNELS }}
          # Test installed packages
          conda list

      - name: Run tests
        run: |
          conda activate ${{ env.TEST_ENV_NAME }}
          pytest -v --pyargs ${{ env.MODULE_NAME }}
